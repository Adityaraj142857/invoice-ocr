# Invoice OCR Pipeline Configuration
# Works on Mac (Apple Silicon + Intel) and Windows automatically

# ── Model ──────────────────────────────────────────────────────────────────
vlm:
  model_id: "Qwen/Qwen2-VL-2B-Instruct"
  device: "auto"        # auto = CUDA → MPS → CPU (detected at runtime)
  dtype: "auto"         # auto = float16 on GPU/MPS, float32 on CPU
  max_new_tokens: 256
  run_verification: false
  fallback_on_failure: true

# ── OCR ────────────────────────────────────────────────────────────────────
ocr:
  enabled: "auto"             # auto = disabled on Mac ARM, enabled on Windows/Linux
  confidence_threshold: 0.3
  multi_lang: ["en", "hi"]

# ── Preprocessing ──────────────────────────────────────────────────────────
preprocessing:
  max_dim: 2048
  min_dim: 800
  deskew_enabled: true
  denoise_enabled: true
  clahe_enabled: true
  binarise_enabled: true

# ── Detection ──────────────────────────────────────────────────────────────
detection:
  stamp:
    search_region_fraction: 0.50    # bottom-right 50%
    min_contour_area: 800           # lowered — catches smaller stamps
    min_ink_density: 0.04           # lowered — catches faint stamps
    hough_param2: 20                # lowered — more sensitive circle detection
    min_strategies_agree: 1         # 1 of 4 strategies firing = stamp present
  signature:
    search_above_px: 220            # pixels above anchor to search
    search_h_padding: 100           # horizontal padding around anchor
    min_contour_area: 80            # minimum stroke area
    min_stroke_count: 2             # minimum strokes to declare signature
    fallback_region_fraction: 0.40  # bottom 40% for fallback scan

# ── Matching ───────────────────────────────────────────────────────────────
matching:
  dealer_threshold: 80.0
  model_threshold: 85.0
  master_dir: "master_data"

# ── Paths ──────────────────────────────────────────────────────────────────
paths:
  input_dir: "data/train_docs"
  output_file: "sample_output/result.json"

# ── Ingestion ──────────────────────────────────────────────────────────────
ingestion:
  dpi: 200
  supported_extensions: [".pdf", ".png", ".jpg", ".jpeg", ".tiff"]

# ── Cost ───────────────────────────────────────────────────────────────────
cost:
  cost_per_document_usd: 0.0